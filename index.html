<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="theme-color" content="#2d327d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="image.png">
    <title>SBB Live Board</title>
    <link rel="icon" type="image/png" href="image.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="board">
        <div class="header">
            <div style="display:flex; align-items:center;">
                <div class="logo-stack">
                    <div class="sbb-logo-text">SBB CFF FFS</div>
                    <div class="header-version">V10 CHUR</div>
                </div>

                <div class="station-container">
                    <div class="station-name" id="displayStation">Zürich HB</div>
                    <div class="temp-header" id="tempDisplay">--°C</div>
                </div>
            </div>

            <div class="clock-face">
                <div id="markers"></div>
                <div class="hand hour-hand" id="hourHand"></div>
                <div class="hand minute-hand" id="minHand"></div>
                <div class="hand second-hand" id="secHand"></div>
            </div>
        </div>

        <div id="map"></div>
        <table>
            <thead>
                <tr>
                    <th data-i18n="departure">ABFAHRT</th>
                    <th data-i18n="destination">LINIE / ZIEL</th>
                    <th style="text-align: right;" data-i18n="track">GLEIS</th>
                </tr>
            </thead>
            <tbody id="boardBody"></tbody>
        </table>
        <div class="last-updated" id="updateTime">Verbindung wird hergestellt...</div>
    </div>

    <div class="search-container">
        <div id="autocomplete-list"></div>
        <div class="search-box">
            <input type="text" id="stationInput" placeholder="Bahnhof suchen..." autocomplete="off">
            <button class="util-btn" onclick="toggleFavorite()">Save</button>
            <button class="util-btn" onclick="openSettings()">Menu</button>
            <button class="update-btn" onclick="fetchBoard()">Update</button>
        </div>

        <!-- DO NOT REMOVE THIS COPYRIGHT - ALL FORKS MUST RETAIN THIS LICENSE -->

        <div class="copyright">
            <a href="https://sites.google.com/view/aeroforge/" target="_blank" rel="noopener noreferrer">© ÆROforge 2026</a><br>
            <br>Version 10 Chur<br>
            All station data and SBB branding used under official terms.<br>
            Licensed under GNU GPLv3.
        </div>
    </div>

    <div id="settingsOverlay" class="overlay-modal" onclick="if(event.target == this) closeSettings()">
        <div class="settings-content">
            <div class="modal-header">
                <h2 data-i18n="settings">Settings</h2>
                <div class="close-btn" onclick="closeSettings()">&times;</div>
            </div>

            <div class="setting-row">
                <label data-i18n="language">Language</label>
                <select id="langSelect" onchange="setLanguage(this.value)" style="padding: 10px; background: #333; color: white; border: 1px solid #444; border-radius: 4px;">
                    <option value="de">Deutsch</option>
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                    <option value="it">Italiano</option>
                    <option value="rm">Rumantsch</option>
                </select>
            </div>

            <div class="setting-row">
                <label data-i18n="maxEntries">Max Entries:</label>
                <input type="number" id="entryInput" onchange="updateEntryCount(this.value)" min="1" max="50" style="padding:10px; background:#333; color:white; border:1px solid #444; border-radius:4px;">
            </div>

            <div class="setting-row">
                <label data-i18n="tempUnit">Temperature Unit:</label>
                <div style="display:flex; gap:10px;">
                    <button class="util-btn" style="flex:1" onclick="setTempUnit('C')">°C</button>
                    <button class="util-btn" style="flex:1" onclick="setTempUnit('F')">°F</button>
                </div>
            </div>

            <div class="setting-row">
                <label data-i18n="timeZoneLabel">Timezone:</label>
                <div style="display:flex; gap:10px;">
                    <button class="util-btn" style="flex:1" onclick="setTimeZone('local')" data-i18n="local">Local</button>
                    <button class="util-btn" style="flex:1" onclick="setTimeZone('Europe/Zurich')" data-i18n="swiss">Swiss</button>
                </div>
            </div>

            <div class="setting-row">
                <label data-i18n="alerts">Alerts (Favorites):</label>
                <div style="display:flex; gap:10px;">
                    <button class="util-btn" id="notifBtnOn" style="flex:1" onclick="setNotifications(true)" data-i18n="on">On</button>
                    <button class="util-btn" id="notifBtnOff" style="flex:1" onclick="setNotifications(false)" data-i18n="off">Off</button>
                </div>
            </div>

            <div class="setting-row">
                <label data-i18n="favoritesLabel">Favorites:</label>
                <div class="fav-list" id="favListContainer"></div>
            </div>
        </div>
    </div>

    <div id="trainDetailsModal" class="overlay-modal" onclick="if(event.target == this) this.style.display='none'">
        <div class="modal-content-details">
          <div class="modal-header">
              <h2 id="modalTrainName"></h2>
              <div class="close-btn" onclick="document.getElementById('trainDetailsModal').style.display='none'">&times;</div>
          </div>
            <div id="modalTrainStatus" class="modal-status"></div>
            <div id="modalRouteList" class="route-list-wrapper"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
